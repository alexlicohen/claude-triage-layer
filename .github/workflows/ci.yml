name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Install shellcheck (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Ensure jq is present
        run: command -v jq || (echo "jq missing after image setup" && exit 1)

      - name: Ensure node is present
        run: command -v node || (echo "node missing after image setup" && exit 1)

      - name: make verify
        run: make verify

      - name: make mutate (strict — any surviving mutant fails)
        run: make mutate
